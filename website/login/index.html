<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Sonus</title>
    <link rel="icon" type="image/png" sizes="1024x1024" href="/assets/samply-icon.png?v=3" />
    <link rel="shortcut icon" type="image/png" href="/assets/samply-icon.png?v=3" />
    <link rel="apple-touch-icon" href="/assets/samply-icon.png?v=3" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/src/site.js"></script>
    <script type="module" src="/src/auth-page.js"></script>
  </head>
  <body data-page="login">
    <header class="site-header compact">
      <a class="brand" href="/"><span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></span><span>Sonus</span></a>
      <div class="site-actions" id="site-nav-actions"></div>
    </header>

    <main class="auth-shell">
      <section class="auth-visual">
        <h1>Welcome back.</h1>
        <p>Sign in to manage your licence, machine slots, and downloads.</p>
      </section>

      <section class="auth-form-zone">
        <div class="auth-switch">
          <a class="active" href="/login/">Log in</a>
          <a href="/signup/">Create</a>
        </div>

        <div class="social-grid">
          <button class="social-btn google" data-oauth-provider="google" data-oauth-flow="login">
            <svg class="oauth-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
            Continue with Google
          </button>
          <button class="social-btn discord" data-oauth-provider="discord" data-oauth-flow="login">
            <svg class="oauth-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20.32 4.37A19.79 19.79 0 0 0 15.36 2.8a13.7 13.7 0 0 0-.64 1.32 18.27 18.27 0 0 0-5.44 0A13.7 13.7 0 0 0 8.64 2.8a19.79 19.79 0 0 0-4.96 1.57C.54 9.02-.31 13.55.1 18.02a19.94 19.94 0 0 0 6.08 3.08c.49-.66.93-1.36 1.31-2.09a12.7 12.7 0 0 1-2.06-.99c.17-.13.34-.26.5-.39a14.2 14.2 0 0 0 12.14 0c.16.13.33.26.5.39-.66.39-1.35.72-2.07.99.38.73.82 1.43 1.31 2.09a19.94 19.94 0 0 0 6.08-3.08c.48-5.18-.82-9.67-3.57-13.65ZM8.02 15.28c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42 2.17 1.09 2.15 2.42c0 1.33-.95 2.41-2.15 2.41Zm7.96 0c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42 2.17 1.09 2.15 2.42c0 1.33-.95 2.41-2.15 2.41Z"/></svg>
            Continue with Discord
          </button>
        </div>

        <div class="form-divider"><span>or</span></div>

        <form class="account-form" id="login-form">
          <label>
            <span>Email or username</span>
            <input id="login-identifier" name="identifier" autocomplete="username" placeholder="Email or username" required />
          </label>
          <label>
            <span>Password</span>
            <div class="password-field">
              <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
              <button class="password-toggle" type="button" data-toggle-password="login-password" aria-label="Show password" aria-pressed="false"></button>
            </div>
          </label>
          <button class="btn btn-accent btn-lg form-button" id="login-submit" type="submit">Log in</button>
          <p class="form-status" id="login-status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-main">
        <a class="brand small" href="/">
          <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
          <span>Sonus</span>
        </a>
        <span>© 2026 Sonus. All rights reserved.</span>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/contact/">Contact</a>
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
        <a href="/cookies/">Cookies</a>
        <a href="/refund/">Refunds</a>
        <a href="/legal/">Legal Notice</a>
      </nav>
    </footer>
  </body>
</html>
