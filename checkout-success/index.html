<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Purchase confirmed - Sonus</title>
    <meta name="description" content="Your Sonus purchase is being confirmed." />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/assets/samply-icon.png?v=3" />
    <link rel="shortcut icon" type="image/png" href="/assets/samply-icon.png?v=3" />
    <link rel="apple-touch-icon" href="/assets/samply-icon.png?v=3" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/src/site.js"></script>
    <script type="module" src="/src/checkout-success.js"></script>
  </head>
  <body data-page="checkout-success">
    <header class="site-header">
      <a class="brand" href="/"><span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></span><span>Sonus</span></a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/" data-nav="home">Home</a>
        <a href="/download/" data-nav="download">Download</a>
        <a href="/patch-notes/" data-nav="patch-notes">Patch notes</a>
      </nav>
      <div class="site-actions" id="site-nav-actions"></div>
    </header>

    <main class="success-shell">
      <section class="success-panel" aria-live="polite">
        <div class="success-mark" aria-hidden="true">
          <span></span>
        </div>
        <p class="section-kicker" id="success-kicker">Checkout complete</p>
        <h1 id="success-title">Finalizing your purchase...</h1>
        <p id="success-copy">Checking Stripe and unlocking your Sonus licence.</p>

        <div class="success-progress" id="success-progress" aria-hidden="true">
          <span></span>
        </div>

        <div class="success-actions">
          <a class="btn btn-accent" id="success-primary" href="/dashboard/" hidden>Open dashboard</a>
          <button class="btn btn-muted" id="success-retry" type="button" hidden>Retry confirmation</button>
        </div>

        <p class="success-countdown" id="success-countdown"></p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-main">
        <a class="brand small" href="/">
          <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
          <span>Sonus</span>
        </a>
        <span>© 2026 Sonus. All rights reserved.</span>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/download/">Download</a>
        <a href="/contact/">Contact</a>
        <a href="/privacy/">Privacy</a>
        <a href="/terms/">Terms</a>
        <a href="/cookies/">Cookies</a>
        <a href="/refund/">Refunds</a>
        <a href="/legal/">Legal Notice</a>
      </nav>
    </footer>
  </body>
</html>
